<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" fill="none">
  <!-- Left hand (green, curved upward) -->
  <path d="M52 170 C35 158 22 138 30 118 C38 98 62 102 70 122 L85 158 C78 168 62 175 52 170Z" fill="#4CAF50"/>
  <path d="M52 170 C40 162 30 148 32 132" stroke="#3d9640" stroke-width="1" fill="none"/>

  <!-- Right hand (green, curved upward) -->
  <path d="M148 170 C165 158 178 138 170 118 C162 98 138 102 130 122 L115 158 C122 168 138 175 148 170Z" fill="#4CAF50"/>
  <path d="M148 170 C160 162 170 148 168 132" stroke="#3d9640" stroke-width="1" fill="none"/>

  <!-- Brain shape - cloud-like outline, white fill, dark blue stroke -->
  <path d="M100 28
    C86 28 75 36 72 48
    C64 48 56 55 55 64
    C48 66 42 73 42 82
    C42 90 47 97 54 100
    C50 106 49 114 52 121
    C55 130 63 136 72 136
    L128 136
    C137 136 145 130 148 121
    C151 114 150 106 146 100
    C153 97 158 90 158 82
    C158 73 152 66 145 64
    C144 55 136 48 128 48
    C125 36 114 28 100 28Z"
    fill="white" stroke="#2D4A6B" stroke-width="4" stroke-linejoin="round"/>

  <!-- Brain center divider line -->
  <path d="M100 38 C100 50 100 120 100 134" stroke="#2D4A6B" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Circuit hub center -->
  <circle cx="100" cy="82" r="5" fill="#2D4A6B"/>

  <!-- Circuit lines from center -->
  <line x1="100" y1="82" x2="70" y2="82" stroke="#2D4A6B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="82" x2="130" y2="82" stroke="#2D4A6B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="82" x2="100" y2="55" stroke="#2D4A6B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="82" x2="100" y2="110" stroke="#2D4A6B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="82" x2="76" y2="60" stroke="#2D4A6B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="82" x2="124" y2="60" stroke="#2D4A6B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Circuit endpoint dots -->
  <circle cx="70" cy="82" r="4.5" fill="#2D4A6B"/>
  <circle cx="130" cy="82" r="4.5" fill="#2D4A6B"/>
  <circle cx="100" cy="55" r="4.5" fill="#2D4A6B"/>
  <circle cx="76" cy="60" r="4" fill="#2D4A6B"/>
  <circle cx="124" cy="60" r="4" fill="#2D4A6B"/>

  <!-- Text: IApoyo -->
  <text x="100" y="188" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="#2D4A6B" text-anchor="middle">IApoyo</text>
  <!-- Text: Consultora -->
  <text x="100" y="215" font-family="Arial, sans-serif" font-size="19" font-weight="500" fill="#3d5a6b" text-anchor="middle">Consultora</text>
</svg>
